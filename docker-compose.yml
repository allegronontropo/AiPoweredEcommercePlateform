services:
  postgres:
    image: postgres:16
    container_name: compintel-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compintel}
      POSTGRES_DB: ${POSTGRES_DB:-compintel}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  n8n:
    image: n8nio/n8n:latest
    container_name: compintel-n8n
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-compintel}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-compintel}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-compintel}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-admin123}
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: compintel-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://compintel:compintel@postgres:5432/compintel}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      PORT: 3000
    depends_on:
      - postgres
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  n8n_data: