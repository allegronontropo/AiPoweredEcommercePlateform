<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competitive Intelligence Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <header>
      <h1>AI Competitive Intelligence Dashboard</h1>
      <p>Track price moves, sentiment shifts, and competitor activity.</p>
    </header>

    <section class="filters">
      <label>
        Competitor
        <select id="competitorFilter"></select>
      </label>
      <label>
        Category
        <input id="categoryFilter" placeholder="e.g. smartphones" />
      </label>
      <label>
        Days
        <select id="daysFilter">
          <option value="7">7</option>
          <option value="30" selected>30</option>
          <option value="90">90</option>
        </select>
      </label>
      <button id="refreshBtn">Refresh</button>
    </section>

    <section class="kpis">
      <div class="card"><h3>Tracked Products</h3><p id="kpiProducts">-</p></div>
      <div class="card"><h3>Avg Sentiment</h3><p id="kpiSentiment">-</p></div>
      <div class="card"><h3>Recent Alerts</h3><p id="kpiAlerts">-</p></div>
    </section>

    <section class="charts">
      <div class="card"><h3>Average Price Trend</h3><canvas id="priceChart"></canvas></div>
      <div class="card"><h3>Average Sentiment Trend</h3><canvas id="sentimentChart"></canvas></div>
    </section>

    <section class="card">
      <h3>Significant Price Change Alerts</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Competitor</th><th>Product</th><th>Price</th><th>Prev</th><th>Δ%</th></tr>
        </thead>
        <tbody id="alertsTable"></tbody>
      </table>
    </section>

    <script src="/app.js"></script>
  </body>
</html>
